name: CI

on:
  pull_request:
    paths:
      - 'eventzen/**'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
    paths:
      - 'eventzen/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eventzen/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eventzen/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  auth-service:
    name: Auth Service Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eventzen/services/auth-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eventzen/services/auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  notification-service:
    name: Notification Service Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eventzen/services/notification-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eventzen/services/notification-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test when configured
        shell: bash
        run: |
          if node -e "const p=require('./package.json'); const hasJest=((p.devDependencies&&p.devDependencies.jest)||(p.dependencies&&p.dependencies.jest)); process.exit(hasJest ? 0 : 1);"; then
            npm test
          else
            echo "Skipping tests: Jest is not configured for notification-service"
          fi

  venue-vendor-service:
    name: Venue Vendor Service Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eventzen/services/venue-vendor-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eventzen/services/venue-vendor-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  event-service:
    name: Event Service Maven Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eventzen/services/event-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Test and package
        run: mvn -B clean test package

  ticketing-service:
    name: Ticketing Service Dotnet Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eventzen/services/ticketing-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test when test projects exist
        shell: bash
        run: |
          if find . -name '*Tests.csproj' -o -name '*.Tests.csproj' | grep -q .; then
            dotnet test --configuration Release --no-build
          else
            echo "Skipping tests: no test project found for ticketing-service"
          fi

  finance-service:
    name: Finance Service Dotnet Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eventzen/services/finance-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test when test projects exist
        shell: bash
        run: |
          if find . -name '*Tests.csproj' -o -name '*.Tests.csproj' | grep -q .; then
            dotnet test --configuration Release --no-build
          else
            echo "Skipping tests: no test project found for finance-service"
          fi

  docker-build:
    name: Docker Compose Build Validation
    runs-on: ubuntu-latest
    needs:
      - frontend
      - auth-service
      - notification-service
      - venue-vendor-service
      - event-service
      - ticketing-service
      - finance-service
    defaults:
      run:
        working-directory: eventzen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build service images
        run: |
          docker compose build \
            auth-service \
            event-service \
            venue-vendor-service \
            ticketing-service \
            finance-service \
            notification-service \
            frontend

  integration-smoke:
    name: Docker Compose Integration Smoke
    runs-on: ubuntu-latest
    needs:
      - docker-build
    defaults:
      run:
        working-directory: eventzen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Smoke check endpoints
        shell: bash
        run: |
          set -euo pipefail

          wait_for_url() {
            local name="$1"
            local url="$2"
            local attempts=60
            local delay=5
            local i=1

            while [ "$i" -le "$attempts" ]; do
              if curl -fsS "$url" >/dev/null; then
                echo "${name} is healthy: ${url}"
                return 0
              fi
              echo "Waiting for ${name} (${i}/${attempts})"
              i=$((i + 1))
              sleep "$delay"
            done

            echo "Timed out waiting for ${name}: ${url}"
            return 1
          }

          wait_for_url "auth-service" "http://localhost:8093/api/v1/health"
          wait_for_url "event-service" "http://localhost:8094/actuator/health"
          wait_for_url "venue-vendor-service" "http://localhost:8095/health"
          wait_for_url "ticketing-service" "http://localhost:8096/api/v1/health"
          wait_for_url "finance-service metrics" "http://localhost:8097/metrics"
          wait_for_url "notification-service" "http://localhost:8098/health"

      - name: Capture compose logs on failure
        if: failure()
        run: docker compose logs --no-color > compose-logs.txt

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: eventzen/compose-logs.txt

      - name: Teardown stack
        if: always()
        run: docker compose down -v --remove-orphans
