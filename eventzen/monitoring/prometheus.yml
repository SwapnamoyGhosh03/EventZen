global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'eventzen-monitor'

scrape_configs:
  # ─── Infrastructure ───────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'docker-host'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      - source_labels: [name]
        regex: 'eventzen-(.*)'
        target_label: service
        replacement: '${1}'

  # ─── Application Services ─────────────────────────────────
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8081']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'event-service'
    static_configs:
      - targets: ['event-service:8082']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s

  - job_name: 'venue-vendor-service'
    static_configs:
      - targets: ['venue-vendor-service:8083']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'ticketing-service'
    static_configs:
      - targets: ['ticketing-service:8084']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'finance-service'
    static_configs:
      - targets: ['finance-service:8085']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:8086']
    metrics_path: '/metrics'
    scrape_interval: 15s
