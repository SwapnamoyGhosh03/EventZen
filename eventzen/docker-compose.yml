services:
  # ─── MySQL Databases ───
  mysql-auth:
    image: mysql:8.0
    container_name: eventzen-mysql-auth
    restart: unless-stopped
    ports:
      - "${HOST_MYSQL_AUTH_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: eventzen_auth
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD}
    volumes:
      - mysql_auth_data:/var/lib/mysql
      - ./db/mysql/auth-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  mysql-events: 
    image: mysql:8.0
    container_name: eventzen-mysql-events
    restart: unless-stopped
    ports:
      - "${HOST_MYSQL_EVENTS_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: eventzen_events
      MYSQL_USER: event_user
      MYSQL_PASSWORD: ${EVENT_DB_PASSWORD}
    volumes:
      - mysql_events_data:/var/lib/mysql
      - ./db/mysql/events-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  mysql-finance:
    image: mysql:8.0
    container_name: eventzen-mysql-finance
    restart: unless-stopped
    ports:
      - "${HOST_MYSQL_FINANCE_PORT:-3308}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: eventzen_finance
      MYSQL_USER: finance_user
      MYSQL_PASSWORD: ${FINANCE_DB_PASSWORD}
    volumes:
      - mysql_finance_data:/var/lib/mysql
      - ./db/mysql/finance-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  # ─── MongoDB Databases ───
  mongodb-venue:
    image: mongo:7
    container_name: eventzen-mongo-venue
    restart: unless-stopped
    ports:
      - "${HOST_MONGO_VENUE_PORT:-27017}:27017"
    volumes:
      - mongo_venue_data:/data/db
      - ./db/mongo/venue-init.js:/docker-entrypoint-initdb.d/venue-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  mongodb-ticketing:
    image: mongo:7
    container_name: eventzen-mongo-ticketing
    restart: unless-stopped
    ports:
      - "${HOST_MONGO_TICKETING_PORT:-27018}:27017"
    volumes:
      - mongo_ticketing_data:/data/db
      - ./db/mongo/ticketing-init.js:/docker-entrypoint-initdb.d/ticketing-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  mongodb-notification:
    image: mongo:7
    container_name: eventzen-mongo-notification
    restart: unless-stopped
    ports:
      - "${HOST_MONGO_NOTIFICATION_PORT:-27019}:27017"
    volumes:
      - mongo_notification_data:/data/db
      - ./db/mongo/notification-init.js:/docker-entrypoint-initdb.d/notification-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  # ─── Cache & Messaging ───
  redis:
    image: redis:7-alpine
    container_name: eventzen-redis
    restart: unless-stopped
    ports:
      - "${HOST_REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: eventzen-zookeeper
    restart: unless-stopped
    ports:
      - "${HOST_ZOOKEEPER_PORT:-2181}:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - eventzen-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: eventzen-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "${HOST_KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${HOST_KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - eventzen-network

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: eventzen-kafka-init
    depends_on:
      - kafka
    volumes:
      - ./kafka/create-topics.sh:/create-topics.sh:ro
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    networks:
      - eventzen-network

  # ─── Object Storage ───
  minio:
    image: minio/minio:latest
    container_name: eventzen-minio
    restart: unless-stopped
    ports:
      - "${HOST_MINIO_API_PORT:-9000}:9000"
      - "${HOST_MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-eventzen}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-eventzen123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  # ─── Search ───
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: eventzen-elasticsearch
    restart: unless-stopped
    ports:
      - "${HOST_ELASTICSEARCH_PORT:-9200}:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  # --- Vault (dev profile) ---
  vault:
    image: hashicorp/vault:1.17
    container_name: eventzen-vault
    restart: unless-stopped
    profiles:
      - vault-dev
    cap_add:
      - IPC_LOCK
    ports:
      - "${HOST_VAULT_PORT:-8200}:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-eventzen-dev-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_SKIP_VERIFY: "true"
    command: server -dev -dev-root-token-id=${VAULT_DEV_ROOT_TOKEN:-eventzen-dev-root} -dev-listen-address=0.0.0.0:8200
    healthcheck:
      test: ["CMD-SHELL", "VAULT_ADDR=http://127.0.0.1:8200 vault status >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
    volumes:
      - vault_data:/vault/file
    networks:
      - eventzen-network

  vault-init:
    image: hashicorp/vault:1.17
    container_name: eventzen-vault-init
    restart: "no"
    profiles:
      - vault-dev
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR_INTERNAL: http://vault:8200
      VAULT_DEV_ROOT_TOKEN: ${VAULT_DEV_ROOT_TOKEN:-eventzen-dev-root}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      EVENT_DB_PASSWORD: ${EVENT_DB_PASSWORD}
      FINANCE_DB_PASSWORD: ${FINANCE_DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      TICKET_HMAC_SECRET: ${TICKET_HMAC_SECRET}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      TWILIO_SID: ${TWILIO_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE: ${TWILIO_PHONE}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID}
      FCM_PRIVATE_KEY: ${FCM_PRIVATE_KEY}
      FCM_CLIENT_EMAIL: ${FCM_CLIENT_EMAIL}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-eventzen}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-eventzen123}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-eventzen}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-eventzen123}
    volumes:
      - ./scripts/vault/seed-dev.sh:/vault/scripts/seed-dev.sh:ro
    entrypoint: ["/bin/sh", "/vault/scripts/seed-dev.sh"]
    networks:
      - eventzen-network

  # ─── Application Services ───
  auth-service:
    build:
      context: ./services/auth-service
    container_name: eventzen-auth-service
    restart: unless-stopped
    depends_on:
      mysql-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "${HOST_AUTH_SERVICE_PORT:-8081}:8081"
    env_file:
      - path: ./.vault/generated/common.env
        required: false
    environment:
      NODE_ENV: development
      AUTH_SERVICE_PORT: 8081
      MYSQL_HOST: mysql-auth
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      KAFKA_BROKERS: kafka:29092
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY}
      BASE_URL: http://localhost:${HOST_FRONTEND_PORT:-5173}
      CORS_ORIGINS: http://localhost:${HOST_FRONTEND_PORT:-5173},http://localhost:3000
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    networks:
      - eventzen-network

  event-service:
    build:
      context: ./services/event-service
    container_name: eventzen-event-service
    restart: unless-stopped
    depends_on:
      mysql-events:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "${HOST_EVENT_SERVICE_PORT:-8082}:8082"
    env_file:
      - path: ./.vault/generated/common.env
        required: false
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-events:3306/eventzen_events?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: http://localhost:${HOST_FRONTEND_PORT:-5173},http://localhost:3000,http://127.0.0.1:${HOST_FRONTEND_PORT:-5173}
    networks:
      - eventzen-network

  venue-vendor-service:
    build:
      context: ./services/venue-vendor-service
    container_name: eventzen-venue-vendor-service
    restart: unless-stopped
    depends_on:
      mongodb-venue:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      minio:
        condition: service_healthy
    ports:
      - "${HOST_VENUE_VENDOR_SERVICE_PORT:-8083}:8083"
    env_file:
      - path: ./.vault/generated/common.env
        required: false
    environment:
      MONGODB_URI: mongodb://mongodb-venue:27017/eventzen_venue
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKERS: kafka:29092
      CORS_ORIGINS: http://localhost:${HOST_FRONTEND_PORT:-5173},http://localhost:3000
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-eventzen}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-eventzen123}
      MINIO_BUCKET: eventzen-media
      MINIO_PUBLIC_URL: http://localhost:${HOST_MINIO_API_PORT:-9000}
    networks:
      - eventzen-network

  ticketing-service:
    build:
      context: ./services/ticketing-service
    container_name: eventzen-ticketing-service
    restart: unless-stopped
    depends_on:
      mongodb-ticketing:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "${HOST_TICKETING_SERVICE_PORT:-8084}:8084"
    env_file:
      - path: ./.vault/generated/common.env
        required: false
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8084
      MongoDB__ConnectionString: mongodb://mongodb-ticketing:27017
      MongoDB__DatabaseName: eventzen_ticketing
      Redis__ConnectionString: redis:6379,password=${REDIS_PASSWORD}
      Kafka__BootstrapServers: kafka:29092
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: eventzen-auth
      TicketHmacSecret: ${TICKET_HMAC_SECRET}
    networks:
      - eventzen-network

  finance-service:
    build:
      context: ./services/finance-service
    container_name: eventzen-finance-service
    restart: unless-stopped
    depends_on:
      mysql-finance:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "${HOST_FINANCE_SERVICE_PORT:-8085}:8085"
    env_file:
      - path: ./.vault/generated/common.env
        required: false
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8085
      ConnectionStrings__DefaultConnection: Server=mysql-finance;Port=3306;Database=eventzen_finance;User=root;Password=${MYSQL_ROOT_PASSWORD};AllowPublicKeyRetrieval=true;SslMode=Preferred
      Redis__ConnectionString: redis:6379,password=${REDIS_PASSWORD}
      Kafka__BootstrapServers: kafka:29092
      Jwt__Secret: ${JWT_SECRET}
      Stripe__SecretKey: ${STRIPE_SECRET_KEY}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET}
    networks:
      - eventzen-network

  notification-service:
    build:
      context: ./services/notification-service
    container_name: eventzen-notification-service
    restart: unless-stopped
    depends_on:
      mongodb-notification:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "${HOST_NOTIFICATION_SERVICE_PORT:-8086}:8086"
    env_file:
      - path: ./.vault/generated/common.env
        required: false
    environment:
      NODE_ENV: production
      PORT: 8086
      MONGO_URI: mongodb://mongodb-notification:27017/eventzen_notifications
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKERS: kafka:29092
      CORS_ORIGINS: http://localhost:${HOST_FRONTEND_PORT:-5173},http://localhost:3000
    networks:
      - eventzen-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eventzen-frontend
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_started
      event-service:
        condition: service_started
      venue-vendor-service:
        condition: service_started
      ticketing-service:
        condition: service_started
      finance-service:
        condition: service_started
      notification-service:
        condition: service_started
    ports:
      - "${HOST_FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_AUTH_API_URL: http://localhost:${HOST_AUTH_SERVICE_PORT:-8081}/api/v1
      VITE_EVENT_API_URL: http://localhost:${HOST_EVENT_SERVICE_PORT:-8082}/api/v1
      VITE_VENUE_API_URL: http://localhost:${HOST_VENUE_VENDOR_SERVICE_PORT:-8083}/api/v1
      VITE_TICKET_API_URL: http://localhost:${HOST_TICKETING_SERVICE_PORT:-8084}/api/v1
      VITE_PAYMENT_API_URL: http://localhost:${HOST_FINANCE_SERVICE_PORT:-8085}/api/v1
      VITE_NOTIFICATION_API_URL: http://localhost:${HOST_NOTIFICATION_SERVICE_PORT:-8086}/api/v1
      VITE_UPLOAD_URL: http://localhost:${HOST_VENUE_VENDOR_SERVICE_PORT:-8083}/api/v1/upload
    networks:
      - eventzen-network

  # ─── Monitoring ───
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: eventzen-prometheus
    restart: unless-stopped
    ports:
      - "${HOST_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - eventzen-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: eventzen-grafana
    restart: unless-stopped
    ports:
      - "${HOST_GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-eventzen123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/eventzen-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - eventzen-network

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: eventzen-node-exporter
    restart: unless-stopped
    ports:
      - "${HOST_NODE_EXPORTER_PORT:-9100}:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - eventzen-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: eventzen-cadvisor
    restart: unless-stopped
    ports:
      - "${HOST_CADVISOR_PORT:-8087}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    privileged: true
    networks:
      - eventzen-network

  # ─── API Gateway ───
  kong:
    image: kong:3.5
    container_name: eventzen-kong
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_started
      event-service:
        condition: service_started
      venue-vendor-service:
        condition: service_started
      ticketing-service:
        condition: service_started
      finance-service:
        condition: service_started
      notification-service:
        condition: service_started
    ports:
      - "${HOST_KONG_PROXY_PORT:-8080}:8000"
      - "${HOST_KONG_SSL_PORT:-8443}:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    volumes:
      - ./gateway/kong.yml:/etc/kong/kong.yml:ro
    networks:
      - eventzen-network

volumes:
  mysql_auth_data:
  mysql_events_data:
  mysql_finance_data:
  mongo_venue_data:
  mongo_ticketing_data:
  mongo_notification_data:
  es_data:
  minio_data:
  vault_data:
  prometheus_data:
  grafana_data:

networks:
  eventzen-network:
    driver: bridge
