version: "3.9"

services:
  # ─── MySQL Databases ───
  mysql-auth:
    image: mysql:8.0
    container_name: eventzen-mysql-auth
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: eventzen_auth
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD}
    volumes:
      - mysql_auth_data:/var/lib/mysql
      - ./db/mysql/auth-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  mysql-events: 
    image: mysql:8.0
    container_name: eventzen-mysql-events
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: eventzen_events
      MYSQL_USER: event_user
      MYSQL_PASSWORD: ${EVENT_DB_PASSWORD}
    volumes:
      - mysql_events_data:/var/lib/mysql
      - ./db/mysql/events-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  mysql-finance:
    image: mysql:8.0
    container_name: eventzen-mysql-finance
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: eventzen_finance
      MYSQL_USER: finance_user
      MYSQL_PASSWORD: ${FINANCE_DB_PASSWORD}
    volumes:
      - mysql_finance_data:/var/lib/mysql
      - ./db/mysql/finance-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  # ─── MongoDB Databases ───
  mongodb-venue:
    image: mongo:7
    container_name: eventzen-mongo-venue
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_venue_data:/data/db
      - ./db/mongo/venue-init.js:/docker-entrypoint-initdb.d/venue-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  mongodb-ticketing:
    image: mongo:7
    container_name: eventzen-mongo-ticketing
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_ticketing_data:/data/db
      - ./db/mongo/ticketing-init.js:/docker-entrypoint-initdb.d/ticketing-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  mongodb-notification:
    image: mongo:7
    container_name: eventzen-mongo-notification
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - mongo_notification_data:/data/db
      - ./db/mongo/notification-init.js:/docker-entrypoint-initdb.d/notification-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  # ─── Cache & Messaging ───
  redis:
    image: redis:7-alpine
    container_name: eventzen-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: eventzen-zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - eventzen-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: eventzen-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - eventzen-network

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: eventzen-kafka-init
    depends_on:
      - kafka
    volumes:
      - ./kafka/create-topics.sh:/create-topics.sh:ro
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    networks:
      - eventzen-network

  # ─── Object Storage ───
  minio:
    image: minio/minio:latest
    container_name: eventzen-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: eventzen
      MINIO_ROOT_PASSWORD: eventzen123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  # ─── Search ───
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: eventzen-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - eventzen-network

  # ─── API Gateway ───
  kong:
    image: kong:3.5
    container_name: eventzen-kong
    restart: unless-stopped
    ports:
      - "8080:8000"
      - "8443:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    volumes:
      - ./gateway/kong.yml:/etc/kong/kong.yml:ro
    networks:
      - eventzen-network

volumes:
  mysql_auth_data:
  mysql_events_data:
  mysql_finance_data:
  mongo_venue_data:
  mongo_ticketing_data:
  mongo_notification_data:
  es_data:
  minio_data:

networks:
  eventzen-network:
    driver: bridge
